<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Issue Addressal Portal — The Address</title>
    <meta name="description" content="Issue Addressal Portal for The Address residents and committee" />
    <!-- Single source of truth for the live web app URL. Update this one line
         whenever Apps Script issues a new deployment ID. -->
    <meta http-equiv="refresh" content="0; url=https://script.google.com/macros/s/AKfycbx7SIr04CSet_D2Zlb12LngDR7tCbef41VJUVG-B4DRfh69SRBWk6sv_agUUMKiYVbA/exec" />
    <link rel="canonical" href="https://script.google.com/macros/s/AKfycbx7SIr04CSet_D2Zlb12LngDR7tCbef41VJUVG-B4DRfh69SRBWk6sv_agUUMKiYVbA/exec" />
    <style>
        :root {
            --bg-grad-from: #0f172a;
            --bg-grad-to:   #1e293b;
            --accent:       #f59e0b;
            --text:         #f1f5f9;
            --muted:        #94a3b8;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                         Oxygen, Ubuntu, Cantarell, "Open Sans", "Helvetica Neue", sans-serif;
        }
        body {
            background: linear-gradient(135deg, var(--bg-grad-from), var(--bg-grad-to));
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .card {
            max-width: 480px;
            width: 100%;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 40px 32px;
            text-align: center;
            backdrop-filter: blur(12px);
        }
        h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .accent { color: var(--accent); }
        p {
            color: var(--muted);
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 24px;
        }
        .spinner {
            width: 36px;
            height: 36px;
            margin: 0 auto 20px;
            border: 3px solid rgba(245, 158, 11, 0.2);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        a.fallback {
            display: inline-block;
            margin-top: 8px;
            padding: 10px 20px;
            background: var(--accent);
            color: #0f172a;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            transition: transform 0.15s ease;
        }
        a.fallback:hover { transform: translateY(-1px); }
        .footnote {
            margin-top: 24px;
            font-size: 11px;
            color: var(--muted);
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <main class="card" role="status" aria-live="polite">
        <div class="spinner" aria-hidden="true"></div>
        <h1>The Address — <span class="accent">IRP</span></h1>
        <p>Redirecting you to the Issue Addressal Portal…</p>
        <a class="fallback" href="https://script.google.com/macros/s/AKfycbx7SIr04CSet_D2Zlb12LngDR7tCbef41VJUVG-B4DRfh69SRBWk6sv_agUUMKiYVbA/exec">Continue manually</a>
        <p class="footnote">If the page does not load automatically, click the button above.</p>
    </main>
    <script>
        // Belt-and-braces: redirect via JS in case the meta refresh is blocked.
        // Preserves any query string / hash so deep links like ?page=admin still work.
        (function () {
            var target = "https://script.google.com/macros/s/AKfycbx7SIr04CSet_D2Zlb12LngDR7tCbef41VJUVG-B4DRfh69SRBWk6sv_agUUMKiYVbA/exec";
            if (window.location.search) {
                target += target.indexOf("?") === -1 ? window.location.search : ("&" + window.location.search.slice(1));
            }
            if (window.location.hash) target += window.location.hash;
            window.location.replace(target);
        })();
    </script>
</body>
</html>
